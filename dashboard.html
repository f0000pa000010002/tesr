<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Radeem App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxZW0iIGhlaWdodD0iMWVtIiB2aWV3Qm94PSIwIDAgMjQgMjQiIGZpbGw9Im5vbmUiIHN0cm9rZT0iIzAwYjBmMSIgc3Ryb2tlLXdpZHRoPSIyIiBzdHJva2UtbGluZWNhcD0icm91bmQiIHN0cm9rZS1saW5lam9pbj0icm91bmQiIGNsYXNzPSJsdWNpZGUg44CQY29kZSI+PHBhdGggZD0iTTQgMTJsOCA4IDggOCIvPjxwYXRoIGQ9Ik0xNiAxMmw4IDggOC04Ii8+PHBhdGggZD0iTTQgMTRsOCA4IDggOCIvPjxwYXRoIGQ9Ik0xNiAxNGw4IDggOC04Ii8+PC9zdmc+" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="user-info">
                <img id="user-avatar" src="https://images.unsplash.com/photo-1544725176-7c40e5a71c5e?w=800&q=80" alt="User Avatar" class="avatar">
                <div class="user-details">
                    <h3 id="username">Loading...</h3>
                    <p id="user-email">Loading...</p>
                </div>
            </div>
            <button id="logout-btn" class="btn btn-secondary">Logout</button>
        </header>

        <main class="dashboard-main">
            <div class="balance-cards">
                <div class="card balance-card">
                    <div class="card-content">
                        <img src="https://images.unsplash.com/photo-1600037217470-821111000000?w=800&q=80" alt="Coins Icon" class="card-icon">
                        <div>
                            <h4>Coins</h4>
                            <p id="coin-balance">0</p>
                        </div>
                    </div>
                    <div class="card-glow"></div>
                </div>
                <div class="card balance-card">
                    <div class="card-content">
                        <img src="https://images.unsplash.com/photo-1582300751111-78177112f37a?w=800&q=80" alt="Diamonds Icon" class="card-icon">
                        <div>
                            <h4>Diamonds</h4>
                            <p id="diamond-balance">0</p>
                        </div>
                    </div>
                    <div class="card-glow"></div>
                </div>
            </div>

            <section class="daily-progress card">
                <h3>Daily Progress</h3>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="daily-progress-bar"></div>
                </div>
                <p>Complete tasks to earn more!</p>
            </section>

            <section class="reward-stats card">
                <h3>Reward Statistics</h3>
                <div class="stats-grid">
                    <div>
                        <h4>Total Ads Watched</h4>
                        <p id="total-ads-watched">0</p>
                    </div>
                    <div>
                        <h4>Total Boxes Opened</h4>
                        <p id="total-boxes-opened">0</p>
                    </div>
                    <div>
                        <h4>Total Redeemed</h4>
                        <p id="total-redeemed">0</p>
                    </div>
                </div>
            </section>
        </main>

        <nav class="bottom-nav">
            <a href="dashboard.html" class="nav-item active">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-home"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                <span>Home</span>
            </a>
            <a href="#" id="earn-nav-link" class="nav-item">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-play-circle"><circle cx="12" cy="12" r="10"/><path d="M10 8v8l6-4-6-4z"/></svg>
                <span>Earn</span>
            </a>
            <a href="#" id="mystery-box-nav-link" class="nav-item">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-package-open"><path d="M21 16V9a2 2 0 0 0-2-2h-5l-3-6a2 2 0 0 0-3.54 0l-3 6H3a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h12m0-14h6m-6 0v14"/><path d="M7 17h10"/></svg>
                <span>Box</span>
            </a>
            <a href="#" id="redeem-nav-link" class="nav-item">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-ticket">
                    <path d="M15 5H5a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2z"/>
                    <path d="M14 10h-4"/>
                    <path d="M14 14h-4"/>
                </svg>
                <span>Redeem</span>
            </a>
            <a href="profile.html" class="nav-item">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-user">
                    <path d="M19 21v-2a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
                <span>Profile</span>
            </a>
        </nav>
    </div>

    <div id="loading-overlay" class="loading-overlay">
        <div class="spinner"></div>
    </div>

    <script src="firebase.js"></script>
    <script src="auth.js"></script>
    <script src="database.js"></script>
    <script src="app.js"></script>
</body>
</html>
